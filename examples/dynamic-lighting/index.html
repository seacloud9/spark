<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • VFX Dynamic Lighting</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background-color: black;
    }

    #canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    header {
      position: absolute;
      z-index: 10;
      margin: 1rem 2rem;
    }

    label {
      font-family: sans-serif;
      font-size: 20px;
      color: white;
      cursor: pointer;
      margin-right: 2rem;
      margin-bottom: 0.5rem;
      background-color: black;
      border-radius: 10px;
    }

    header {
      width: 100%;
      padding: 0;
      margin-left: 0;
      padding-top: 20px;
      text-align: center;
    }

    @media screen and (max-width: 60em) {
      label {
        font-size: 18px;
      }

      header {
        margin-left: 1.2rem;
      }
    }

  </style>
</head>

<body>
  <header>
    <label><input type="checkbox" id="debug" autocomplete="off">Debug Light SDFs</label>
    <label><input type="checkbox" id="daynight" checked="checked" autocomplete="off"> Enable Lighting</label>
  </header>

  <canvas id="canvas"></canvas>
  <script type="importmap">
  {
    "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import {
      FpsMovement,
      PointerControls,
      SplatEdit,
      SplatEditRgbaBlendMode,
      SplatEditSdf,
      SplatEditSdfType,
      SplatMesh,
    } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const canvas = document.getElementById("canvas");

    const env = await setupSparkExample({
      canvas,
      cameraConfig: { fov: 60, near: 0.1, far: 100, position: [0, 0.3, -2.5], lookAt: [0, 0.3, -10] },
    });

    const splatURL = await getAssetFileURL("fireplace.spz");
    const fireplace = new SplatMesh({ url: splatURL });
    fireplace.quaternion.set(1, 0, 0, 0);
    fireplace.position.set(0, -1, -10);
    env.add(fireplace);
    await fireplace.initialized;
    document.body.dataset.dynamicLightingSplats = String(fireplace.numSplats);

    const fpsMovement = new FpsMovement({ moveSpeed: 2 });
    const pointerControls = new PointerControls({ canvas });

    let night = true;
    let frameCount = 0;
    const lights = [];
    const helpers = [];

    function createLight(lightingLayer, position, color, radius, opacity) {
      const light = new SplatEditSdf({
        type: SplatEditSdfType.SPHERE,
        color,
        radius,
        opacity,
      });
      light.position.copy(position);

      const helper = new THREE.Mesh(
        new THREE.SphereGeometry(radius, 16, 16),
        new THREE.MeshBasicMaterial({ wireframe: true, color }),
      );
      helper.position.copy(light.position);
      helper.visible = false;
      env.add(helper);
      helpers.push(helper);

      lightingLayer.add(light);
      lights.push(light);
    }

    const emberLayer = new SplatEdit({
      rgbaBlendMode: SplatEditRgbaBlendMode.ADD_RGBA,
      sdfSmooth: 0.1,
      softEdge: 0.8,
    });
    env.add(emberLayer);

    const lightingLayer = new SplatEdit({
      rgbaBlendMode: SplatEditRgbaBlendMode.ADD_RGBA,
      sdfSmooth: 0.1,
      softEdge: 1.4,
    });
    env.add(lightingLayer);

    const ambientLayer = new SplatEdit({
      rgbaBlendMode: SplatEditRgbaBlendMode.DARKEN,
      sdfSmooth: 0.1,
      softEdge: 0.05,
    });
    env.add(ambientLayer);

    createLight(emberLayer, new THREE.Vector3(0.5, -1.0, -10.5), new THREE.Color(1, 0.6, 0.4), 0.75, 1);
    createLight(lightingLayer, new THREE.Vector3(0.3, -1.1, -10.6), new THREE.Color(1, 0.95, 0.2), 1.6, 0);
    createLight(ambientLayer, new THREE.Vector3(0, 1, -11), new THREE.Color(1, 0.8, 0.6), 6, 0.8);

    const debugCheckbox = document.getElementById("debug");
    const daynightCheckbox = document.getElementById("daynight");

    function setDebugHelpers(visible) {
      debugCheckbox.checked = visible;
      for (const helper of helpers) {
        helper.visible = visible;
      }
      document.body.dataset.dynamicLightingDebug = String(visible);
      document.body.dataset.dynamicLightingHelpersVisible = String(helpers.filter((helper) => helper.visible).length);
    }

    function setLighting(enabled) {
      daynightCheckbox.checked = enabled;
      night = enabled;
      document.body.dataset.dynamicLightingEnabled = String(night);
    }

    document.body.dataset.dynamicLightingReady = "true";
    document.body.dataset.dynamicLightingLights = String(lights.length);
    document.body.dataset.dynamicLightingHelpers = String(helpers.length);
    setDebugHelpers(false);
    setLighting(true);

    window.sparkDynamicLighting = {
      setDebug: setDebugHelpers,
      setLighting,
    };

    let lastTime;
    env.run((time) => {
      frameCount += 1;
      document.body.dataset.dynamicLightingFrames = String(frameCount);
      const timeSeconds = time * 0.0005;
      const deltaTime = timeSeconds - (lastTime ?? timeSeconds);
      lastTime = timeSeconds;

      pointerControls.update(deltaTime, env.camera);
      env.camera.position.z = -2.5 - Math.sin(timeSeconds * 0.1) * 2;

      const baseHue = 0.04;
      const hueVariation = 0.03;
      const randomFlicker = Math.sin(timeSeconds * 4) * 0.5 + 0.5;
      const mediumFlicker = Math.sin(timeSeconds * 13) * 0.1 + 0.1;
      const fastFlicker = Math.sin(timeSeconds * 20) * 0.1 + 0.1;
      const slowFlicker = Math.sin(timeSeconds * 6) * 0.04 + 0.5;
      const combinedFlicker = (slowFlicker + mediumFlicker + fastFlicker) / 3;

      for (let i = 0; i < lights.length - 1; i++) {
        const h = baseHue + combinedFlicker * hueVariation;
        const s = 0.5 + randomFlicker * 0.3;
        const l = 0.5 + combinedFlicker * 0.2;
        lights[i].color.setHSL(h, s, l);
        lights[i].visible = night;
      }

      lights[lights.length - 1].visible = night;
      lights[lights.length - 1].color.setHSL(baseHue, 0.5, combinedFlicker);
      document.body.dataset.dynamicLightingNightVisible = String(lights.filter((light) => light.visible).length);
      document.body.dataset.dynamicLightingFlicker = combinedFlicker.toFixed(4);
    });

    debugCheckbox.addEventListener('change', (ev) => {
      setDebugHelpers(ev.target.checked);
    });
    daynightCheckbox.addEventListener('change', (ev) => {
      setLighting(ev.target.checked);
    });
  </script>
</body>

</html>
