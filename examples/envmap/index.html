<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Spark • Environment Mapping</title>
  <style>
    body {
      margin: 0;
    }

    label {
      font-family: sans-serif;
      font-size: 20px;
      position: absolute;
      color: white;
      cursor: pointer;
      padding: 10px;
      border-radius: 10px;
      display: block;
      width: 100px;
      left: calc(50% - 50px);
      top: 10px;
      text-align: center;
      background-color: black;
    }
  </style>
</head>

<body>
  <label><input type="checkbox" onchange="toggleMetal(this)" autocomplete="off"> Plastic</label>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
  <script type="module">
    import { PackedSplats, SparkRenderer, SplatMesh } from "@sparkjsdev/spark";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: { fov: 75, position: [0, 0.5, 0], lookAt: [0, 0.5, -1] },
      clearColor: 0x1b2037,
    });

    const splatURL = await getAssetFileURL("fireplace.spz");
    const packedSplats = new PackedSplats({ url: splatURL });
    const background = new SplatMesh({ packedSplats });
    background.quaternion.set(1, 0, 0, 0);
    background.position.set(0.5, 0, -1);
    background.scale.setScalar(0.5);
    env.add(background);

    const background2 = new SplatMesh({ packedSplats });
    background2.quaternion.set(1, 0, 0, 0);
    background2.rotation.y = Math.PI;
    background2.position.set(-0.5, 0, 0.0);
    background2.scale.setScalar(0.5);
    env.add(background2);

    // Make sure background is loaded before rendering env map
    await background.initialized;
    await background2.initialized;

    // Add rubber duck
    const gltfLoader = new GLTFLoader();
    const modelURL = await getAssetFileURL("rubberduck.glb");
    const gltf = await gltfLoader.loadAsync(modelURL);
    const duck = gltf.scene;
    duck.position.set(0, 0.45, -0.4);
    env.add(duck);

    // renderEnvMap renders the splat backgrounds (hiding the duck) into a
    // PMREMGenerator-friendly cubemap texture. Use a dedicated SparkRenderer
    // off the same Three renderer so the offline render does not collide
    // with the main spark's sort budget.
    const offline = new SparkRenderer({ renderer: env.renderer });
    const envMap = await offline.renderEnvMap({
      scene: env.scene,
      worldCenter: duck.position,
      hideObjects: [duck],
    });
    let envMappedMaterials = 0;
    for (const obj of duck.children) {
      obj.material.envMap = envMap;
      obj.material.metalness = 1.0;
      obj.material.roughness = 0.02;
      if (obj.material.envMap) {
        envMappedMaterials += 1;
      }
    }
    let frameCount = 0;

    env.run((_time, deltaTime) => {
      frameCount += 1;
      document.body.dataset.envmapFrames = String(frameCount);
      duck.rotation.y += deltaTime / 2500;
    });

    function recordDuckMaterialState(mode) {
      document.body.dataset.envmapMode = mode;
      document.body.dataset.envmapDuckChildren = String(duck.children.length);
      document.body.dataset.envmapMaterials = String(envMappedMaterials);
      document.body.dataset.envmapMetalness = String(duck.children[0]?.material?.metalness ?? "none");
      document.body.dataset.envmapRoughness = String(duck.children[0]?.material?.roughness ?? "none");
    }

    window.toggleMetal = function toggleMetal(el) {
      const metal = el.checked;
      for (const obj of duck.children) {
        obj.material.metalness = metal ? 0.0 : 1.0;
        obj.material.roughness = metal ? 0.2 : 0.02;
      }
      recordDuckMaterialState(metal ? "plastic" : "metal");
    };

    document.body.dataset.envmapReady = "true";
    document.body.dataset.envmapSplats = String(background.numSplats);
    recordDuckMaterialState("metal");

    window.sparkEnvMap = {
      setPlastic(plastic) {
        window.toggleMetal({ checked: plastic });
        return {
          metalness: duck.children[0]?.material?.metalness ?? null,
          mode: document.body.dataset.envmapMode,
          roughness: duck.children[0]?.material?.roughness ?? null,
        };
      },
    };
  </script>
</body>

</html>
