<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • ExtSplats</title>
  <style>
    body {
      margin: 0;
      background-color: black;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { SparkControls, SplatMesh } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: { fov: 75, near: 0.01, position: [0, 0, 0], lookAt: [0, 0, -1] },
    });

    // Splats in file are positioned 1000 units away, bring them toward the camera.
    // PackedSplats stores positions as float16, which has only 10 bits of mantissa
    // (approx 1/1000 relative precision), while ExtSplats stores float32 positions,
    // with 24 bits of mantissa (approx 1/16M relative precision).
    const group = new THREE.Group();
    group.position.set(0, 0, 1000);
    env.add(group);

    function makeSplats(url, position, options) {
      const splats = new SplatMesh({ url, ...options });
      splats.position.set(...position);
      group.add(splats);
      return splats;
    }

    const url = await getAssetFileURL("distant-igloo.spz");
    const packedMesh = makeSplats(url, [0, -1.5, 0], { extSplats: false });
    const extMesh = makeSplats(url, [0, 1.5, 0], { extSplats: true });
    await Promise.all([packedMesh.initialized, extMesh.initialized]);
    document.body.dataset.extSplatsReady = "true";
    document.body.dataset.extSplatsChildren = String(group.children.length);
    document.body.dataset.extSplatsPacked = String(packedMesh.packedSplats != null);
    document.body.dataset.extSplatsExtended = String(extMesh.extSplats != null);
    document.body.dataset.extSplatsPackedCount = String(packedMesh.numSplats);
    document.body.dataset.extSplatsExtendedCount = String(extMesh.numSplats);
    let frameCount = 0;

    const controls = new SparkControls({ canvas: env.renderer.domElement });

    env.run((time) => {
      frameCount += 1;
      group.position.y = Math.sin(time / 1000) * 1.5;
      document.body.dataset.extSplatsFrames = String(frameCount);
      document.body.dataset.extSplatsGroupY = group.position.y.toFixed(3);
      controls.update(env.camera);
    });
  </script>
</body>

</html>
