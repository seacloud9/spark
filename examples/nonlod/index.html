<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Non-LoD + LoD</title>
  <style>
    body {
      margin: 0;
      background-color: black;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm",
        "lil-gui": "../js/vendor/lil-gui/dist/lil-gui.esm.js"
      }
    }
  </script>
  <script type="module">
    import { SparkControls, SplatMesh, dyno } from "@sparkjsdev/spark";
    import GUI from "lil-gui";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: { fov: 75, near: 0.01, position: [0, 0, 0], lookAt: [0, 0, -1] },
      sparkOptions: { lodSplatCount: 100000 },
    });

    const allSplats = [];

    function updateAllSplats() {
      allSplats.forEach((splats) => splats.updateVersion());
    }

    const splatColoring = dyno.dynoBool(true);

    function makeSplatIndexColoring() {
      return dyno.dynoBlock({ gsplat: dyno.Gsplat }, { gsplat: dyno.Gsplat }, ({ gsplat }) => {
        let { index, rgb } = dyno.splitGsplat(gsplat).outputs;
        const debugRgb = dyno.debugColorHue(dyno.shr(index, dyno.dynoConst("int", 12)));
        rgb = dyno.select(splatColoring, dyno.mul(debugRgb, rgb), rgb);
        return { gsplat: dyno.combineGsplat({ gsplat, rgb }) };
      });
    }

    function makeButterfly(url, position, options) {
      const splats = new SplatMesh({ url, ...options });
      splats.objectModifiers = [makeSplatIndexColoring()];
      splats.updateGenerator();
      splats.quaternion.set(1, 0, 0, 0);
      splats.position.set(...position);
      env.add(splats);

      allSplats.push(splats);
      return splats;
    }

    const url = await getAssetFileURL("butterfly-ai.spz");
    const rawMesh = makeButterfly(url, [-1, 0, -1.5], { lod: false });
    const lodMesh = makeButterfly(url, [1, 0, -1.5], { lod: true });

    const nonLod = makeButterfly(url, [0, 0, -1.5], { lod: true, nonLod: true });
    nonLod.enableLod = true;
    await Promise.all([
      rawMesh.initialized,
      lodMesh.initialized,
      nonLod.initialized,
    ]);

    const gui = new GUI({ title: "Settings" });
    gui.add(nonLod, "enableLod").name("Enable LoD for non-LoD").onChange(updateAllSplats);
    gui.add(env.spark, "lodSplatCount", 10000, 250000, 10000).name("LoD splat count");
    gui.add(splatColoring, "value").name("Splat index coloring").onChange(updateAllSplats);

    const controls = new SparkControls({ canvas: env.renderer.domElement });
    let frameCount = 0;
    let updates = 0;

    function recordNonLodState() {
      document.body.dataset.nonlodReady = "true";
      document.body.dataset.nonlodMeshes = String(allSplats.length);
      document.body.dataset.nonlodRawLod = String(rawMesh.enableLod);
      document.body.dataset.nonlodLodEnabled = String(lodMesh.enableLod);
      document.body.dataset.nonlodToggleEnabled = String(nonLod.enableLod);
      document.body.dataset.nonlodColoring = String(splatColoring.value);
      document.body.dataset.nonlodLodSplatCount = String(env.spark.lodSplatCount);
      document.body.dataset.nonlodSplats = String(nonLod.numSplats);
      document.body.dataset.nonlodFrames = String(frameCount);
      document.body.dataset.nonlodUpdates = String(updates);
    }

    recordNonLodState();

    window.sparkNonLod = {
      setParams(params) {
        if (params.enableLod != null) {
          nonLod.enableLod = params.enableLod;
        }
        if (params.splatColoring != null) {
          splatColoring.value = params.splatColoring;
        }
        if (params.lodSplatCount != null) {
          env.spark.lodSplatCount = params.lodSplatCount;
        }
        updateAllSplats();
        updates += 1;
        recordNonLodState();
        return {
          coloring: splatColoring.value,
          enableLod: nonLod.enableLod,
          lodSplatCount: env.spark.lodSplatCount,
          updates,
        };
      },
    };

    env.run(() => {
      frameCount += 1;
      recordNonLodState();
      controls.update(env.camera);
    });
  </script>
</body>

</html>
