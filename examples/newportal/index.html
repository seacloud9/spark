<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Multi-Portal Example (using SparkPortals)</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm",
        "lil-gui": "../js/vendor/lil-gui/dist/lil-gui.esm.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
  <script type="module">
    import * as THREE from "three";
    import {
      SparkPortals,
      SplatMesh,
      SparkControls,
    } from "@sparkjsdev/spark";
    import GUI from "lil-gui";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    // ========== Setup ==========
    const stats = new Stats();
    document.body.appendChild(stats.dom);

    const env = await setupSparkExample({
      cameraConfig: {
        fov: 90,
        near: 0.1,
        far: 1000,
        position: [0, 0, 0],
        lookAt: [0, 0, -1],
      },
      clearColor: 0x000000,
    });
    const scene = env.scene;
    const camera = env.camera;
    const renderer = env.renderer;

    scene.remove(env.spark);
    env.spark.dispose();

    // Local frame for camera (used for movement and teleportation)
    const localFrame = new THREE.Group();
    scene.add(localFrame);
    localFrame.add(camera);

    let portalFrameCount = 0;
    let portalCrossCount = 0;
    function recordPortalCross(pair, fromEntry) {
      portalCrossCount += 1;
      document.body.dataset.newPortalCrosses = String(portalCrossCount);
      document.body.dataset.newPortalLastCross = fromEntry ? "entry-exit" : "exit-entry";
      console.log(`Crossed portal: ${fromEntry ? 'entry→exit' : 'exit→entry'}`);
    }

    // ========== Portal System ==========
    const portals = new SparkPortals({
      renderer,
      scene,
      camera,
      localFrame,
      defaultPortalRadius: 1.0,
      sparkOptions: {
        maxStdDev: Math.sqrt(4),
        lodSplatScale: 0.5,
        behindFoveate: 0.3,
        coneFov0: 20.0,
        coneFov: 150.0,
        coneFoveate: 0.3,
      },
    });

    // Add first portal pair
    const pair1 = portals.addPortalPair({ radius: 1.0, onCross: recordPortalCross });
    pair1.entryPortal.position.set(0, 0, -1);
    pair1.exitPortal.position.set(-3, 0, -4.5);

    // Add second portal pair (smaller)
    const pair2 = portals.addPortalPair({ radius: 1.0, onCross: recordPortalCross });
    pair2.entryPortal.position.set(4, 0, -2);
    pair2.exitPortal.position.set(5, 0, -8);
    document.body.dataset.newPortalPairs = String(portals.portalPairs.length);

    // ========== Load Splat Assets ==========
    async function loadPortalSplat() {
      const url = await getAssetFileURL("butterfly.spz");

      console.log("Loading", url);

      const absoluteURL = new URL(url, window.location.href).href;

      const mesh = new SplatMesh({ url: absoluteURL });
      await mesh.initialized;

      mesh.position.fromArray([0, 0, -3]);
      mesh.quaternion.fromArray([1, 0, 0, 0]);

      scene.add(mesh);
      document.body.dataset.newPortalReady = "true";
      document.body.dataset.newPortalSplats = String(mesh.numSplats);
      console.log("Loaded", url);
    }

    await loadPortalSplat();

    window.sparkNewPortal = {
      forceEntryCross() {
        localFrame.position.set(0, 0, 0);
        localFrame.quaternion.identity();
        localFrame.updateMatrixWorld(true);
        camera.updateMatrixWorld(true);
        portals.updateTeleportation();

        localFrame.position.set(0, 0, -1.2);
        localFrame.updateMatrixWorld(true);
        camera.updateMatrixWorld(true);
        portals.updateTeleportation();

        return {
          crosses: portalCrossCount,
          position: localFrame.position.toArray(),
        };
      },
    };

    // ========== Controls ==========
    const controls = new SparkControls({
      renderer,
      canvas: env.canvas,
    });

    // ========== GUI ==========
    const gui = new GUI({ title: "Portal Settings" });
    gui.add(portals.portalRenderer, "lodSplatScale", 0.001, 2.0, 0.001).name("LOD Scale").onChange((v) => {
      portals.behindRenderer.lodSplatScale = v;
    });

    // Portal Pair 1
    const pair1Folder = gui.addFolder("Portal Pair 1");
    pair1Folder.add(pair1, "radius", 0.1, 3.0, 0.1).name("Radius");

    const pair1EntryFolder = pair1Folder.addFolder("Entry Portal");
    pair1EntryFolder.add(pair1.entryPortal.position, "x", -10, 10, 0.1).name("X");
    pair1EntryFolder.add(pair1.entryPortal.position, "y", -10, 10, 0.1).name("Y");
    pair1EntryFolder.add(pair1.entryPortal.position, "z", -10, 10, 0.1).name("Z");

    const pair1ExitFolder = pair1Folder.addFolder("Exit Portal");
    pair1ExitFolder.add(pair1.exitPortal.position, "x", -10, 10, 0.1).name("X");
    pair1ExitFolder.add(pair1.exitPortal.position, "y", -10, 10, 0.1).name("Y");
    pair1ExitFolder.add(pair1.exitPortal.position, "z", -10, 10, 0.1).name("Z");

    // Portal Pair 2
    const pair2Folder = gui.addFolder("Portal Pair 2");
    pair2Folder.add(pair2, "radius", 0.1, 3.0, 0.1).name("Radius");

    const pair2EntryFolder = pair2Folder.addFolder("Entry Portal");
    pair2EntryFolder.add(pair2.entryPortal.position, "x", -10, 10, 0.1).name("X");
    pair2EntryFolder.add(pair2.entryPortal.position, "y", -10, 10, 0.1).name("Y");
    pair2EntryFolder.add(pair2.entryPortal.position, "z", -10, 10, 0.1).name("Z");

    const pair2ExitFolder = pair2Folder.addFolder("Exit Portal");
    pair2ExitFolder.add(pair2.exitPortal.position, "x", -10, 10, 0.1).name("X");
    pair2ExitFolder.add(pair2.exitPortal.position, "y", -10, 10, 0.1).name("Y");
    pair2ExitFolder.add(pair2.exitPortal.position, "z", -10, 10, 0.1).name("Z");

    // Collapse sub-folders by default
    pair1EntryFolder.close();
    pair1ExitFolder.close();
    pair2Folder.close();

    window.addEventListener("resize", () => {
      portals.updateAspect(camera.aspect);
    });

    env.runManual(() => {
      portalFrameCount += 1;
      document.body.dataset.newPortalFrames = String(portalFrameCount);
      stats.begin();

      // Update controls
      controls.update(localFrame);

      // Update portals and render
      portals.animateLoopHook();

      stats.end();
    });

  </script>
</body>

</html>
