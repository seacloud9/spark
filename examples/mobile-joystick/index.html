<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Spark • Mobile Joystick</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      touch-action: none;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
    }
    #info.mobile {
      background: rgba(40, 120, 200, 0.8);
    }
  </style>
</head>

<body>
  <div id="info">Loading...</div>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm",
        "lil-gui": "../js/vendor/lil-gui/dist/lil-gui.esm.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { SplatMesh, SparkControls } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { initMobileControls, getMobileInput, isMobileDevice } from "./mobile-joystick.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: { fov: 60, near: 0.1, position: [0, 0, 0], lookAt: [0, 0, -1] },
    });
    const queryParams = new URLSearchParams(window.location.search);
    const forceMobile = queryParams.get("testMobile") === "1";
    const testAsset = queryParams.get("testAsset");

    // Reparent env.camera into a cameraRig group so joystick / WASD
    // translates the rig and SparkControls rotates the camera child.
    // env.camera is the same Three camera the active host renders
    // through, so reparenting it carries through to every backend.
    const cameraRig = new THREE.Group();
    cameraRig.position.set(0, 1.6, 0);
    env.scene.add(cameraRig);
    cameraRig.add(env.camera);

    // Load the valley environment
    const splatURL = await getAssetFileURL(testAsset ?? "valley.spz");
    const splat = new SplatMesh({ url: splatURL });
    splat.quaternion.set(1, 0, 0, 0);
    splat.position.set(0, 0, -3);
    env.add(splat);
    await splat.initialized;

    // Desktop controls (mouse/keyboard)
    const controls = new SparkControls({ canvas: env.renderer.domElement });

    // Mobile joystick
    const isMobile = forceMobile || isMobileDevice();
    const info = document.getElementById('info');

    if (isMobile) {
      initMobileControls({
        joystickSize: 140,
        knobSize: 60,
        marginLeft: 40,
        marginBottom: 40,
      });
      info.textContent = '🕹️ Use joystick to move • Drag to look around';
      info.classList.add('mobile');
    } else {
      info.textContent = 'WASD to move • Drag to look around';
    }

    // Movement settings
    const MOVE_SPEED = 2.0;
    let frameCount = 0;
    let appliedInputs = 0;

    function recordMobileJoystickState() {
      document.body.dataset.mobileJoystickRig = cameraRig.position.toArray().map((value) => value.toFixed(3)).join(",");
      document.body.dataset.mobileJoystickFrames = String(frameCount);
      document.body.dataset.mobileJoystickInputs = String(appliedInputs);
    }

    function applyJoystickInput(inputX, inputY, deltaTimeMs) {
      if (inputX !== 0 || inputY !== 0) {
        const dtSec = deltaTimeMs / 1000;
        const move = new THREE.Vector3(inputX, 0, inputY);
        move.multiplyScalar(MOVE_SPEED * dtSec);
        move.applyQuaternion(cameraRig.quaternion);
        cameraRig.position.add(move);
        appliedInputs += 1;
        recordMobileJoystickState();
      }
    }

    document.body.dataset.mobileJoystickReady = "true";
    document.body.dataset.mobileJoystickMobile = String(isMobile);
    document.body.dataset.mobileJoystickSplats = String(splat.numSplats);
    document.body.dataset.mobileJoystickAsset = splatURL.substring(splatURL.lastIndexOf("/") + 1);
    recordMobileJoystickState();

    window.sparkMobileJoystick = {
      applyInput(inputX, inputY, deltaTimeMs = 1000) {
        applyJoystickInput(inputX, inputY, deltaTimeMs);
        return {
          inputs: appliedInputs,
          rig: cameraRig.position.toArray(),
        };
      },
    };

    env.run((time, deltaTime) => {
      frameCount += 1;
      recordMobileJoystickState();
      // Update desktop controls (handles mouse look on both desktop & mobile)
      controls.update(cameraRig);

      // Apply mobile joystick movement
      if (isMobile) {
        const input = getMobileInput();
        applyJoystickInput(input.x, input.y, deltaTime);
      }
    });
  </script>
</body>

</html>
