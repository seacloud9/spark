<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Multiple Splats</title>
  <style>
    body {
      margin: 0;
    }

    a,
    footer {
      color: #797979
    }

    footer {
      position: absolute;
      margin: 10px;
      bottom: 0;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
  <script type="module">
    import { PackedSplats, SplatMesh } from "@sparkjsdev/spark";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: {
        fov: 50,
        position: [0, 0, 6.5],
        lookAt: [0, 0, 0],
      },
      clearColor: 0xffffff,
    });

    let splatURL = await getAssetFileURL("butterfly-ai.spz");
    const butterflySplats = new PackedSplats({ url: splatURL });
    const butterflies = [];
    for (let i = 0; i < 6; i++) {
      const splat = new SplatMesh({ packedSplats: butterflySplats });
      splat.quaternion.set(1, 0, 0, 0);
      env.add(splat);
      butterflies.push(splat);
    }

    splatURL = await getAssetFileURL("cat.spz");
    const cat = new SplatMesh({ url: splatURL });
    cat.quaternion.set(1, 0, 0, 0);
    cat.scale.setScalar(0.5);
    env.add(cat);

    // OrbitControls hooks pointer events on the visible canvas. Under the
    // Babylon backend the visible canvas and env.renderer's internal canvas
    // are the same DOM node, so the controls drive env.camera as expected.
    const controls = new OrbitControls(env.camera, env.renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.minDistance = 0.3;
    controls.maxDistance = 20;
    controls.update();

    const RADIUS = 2;

    env.run((time) => {
      controls.update();

      // Rotate food
      for (let i = 0; i < butterflies.length; i++) {
        const ang = (-time / 10000) + i / butterflies.length * Math.PI * 2;
        butterflies[i].position.set(Math.cos(ang) * RADIUS, Math.sin(ang) * RADIUS - 0.2, 0);
        butterflies[i].rotation.y = i + time / 4000;
      }

      // Animate food master
      cat.position.y = -0.8 + Math.sin(time / 1000) * 0.1;
    });
  </script>
</body>

</html>
