<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Raycasting</title>
  <style>
    body {
      margin: 0;
    }

    header {
      position: absolute;
      color: silver;
      font-family: sans-serif;
      padding-top: 20px;
      text-align: center;
      width: 100vw;
      z-index: 1;
    }
  </style>
</head>

<body>
  <header>Click to select</header>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { SplatMesh, PackedSplats } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: {
        fov: 50,
        near: 0.1,
        far: 10,
        position: [0, -0.25, -1.5],
        lookAt: [0, -0.15, 0],
      },
    });

    // Add robots
    const NUM_ROBOTS = 5;
    const robots = [];
    const splatURL = await getAssetFileURL("robot-head.spz");
    const packedSplats = new PackedSplats({ url: splatURL });
    for (let i = 0; i < NUM_ROBOTS; i++) {
      const robot = new SplatMesh({ packedSplats });
      robot.rotation.x = Math.PI;
      robot.scale.setScalar(0.2);
      robot.position.set(0, 0, i);
      robot.speed = 600 + i * 10;
      robot.angle = 0;
      robot.clickedTimer = false;
      env.add(robot);
      robots.push(robot);
    }

    // Raycast logic. Attach to document so the click is caught regardless of
    // which engine's canvas is currently composited on top. NDC is computed
    // from viewport dimensions so it stays accurate across backends.
    const raycaster = new THREE.Raycaster();
    document.addEventListener("click", (event) => {
      const clickCoords = new THREE.Vector2(
        (event.clientX / window.innerWidth) * 2 - 1,
        -(event.clientY / window.innerHeight) * 2 + 1,
      );

      raycaster.setFromCamera(clickCoords, env.camera);
      const hits = raycaster.intersectObjects(env.scene.children);

      const index = hits.findIndex(hit => hit.object instanceof SplatMesh);
      if (index >= 0) {
        const robot = hits[index].object;
        if (!robot.clickedTimer) {
          robot.recolor.set(1, 0.5, 0.5);
          robot.clickedTimer = 40;
        }
      }
    });

    env.run((time) => {
      for (let robot of robots) {
        robot.position.x = Math.cos(robot.angle) * 0.6;
        robot.position.y = Math.sin(robot.angle) * 0.6;
        robot.angle = Math.PI * 1.5 + Math.sin(time / robot.speed);

        if (robot.clickedTimer > 0) {
          robot.clickedTimer -= 1;
          if (robot.clickedTimer == 0) {
            robot.recolor.set(1, 1, 1);
          }
        }
      }
    });
  </script>
</body>

</html>
