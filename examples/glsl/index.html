<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • GLSL Shaders</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
  <script type="module">
    import { SparkControls, SplatMesh, dyno } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: { fov: 60, position: [0, 0, 0], lookAt: [0, 0, -1] },
    });

    const splatURL = await getAssetFileURL("butterfly.spz");
    const butterfly = new SplatMesh({ url: splatURL });
    butterfly.quaternion.set(1, 0, 0, 0);
    butterfly.position.set(0, 0, -1.5);
    env.add(butterfly);
    await butterfly.initialized;

    // A Gsplat type is defined in GLSL in src/dyno/splats.ts as follows:
    // struct Gsplat {
    //   vec3 center;
    //   uint flags;
    //   vec3 scales;
    //   int index;
    //   vec4 quaternion;
    //   vec4 rgba;
    // };
    // const uint GSPLAT_FLAG_ACTIVE = 1u << 0u;

    // Inject GLSL color shader into world-space SplatMesh modifier
    const worldModifier = new dyno.Dyno({
      inTypes: { gsplat: dyno.Gsplat },
      outTypes: { gsplat: dyno.Gsplat },
      globals: () => [dyno.unindent(`
        vec3 waveRgb(vec3 pos) {
          return vec3(
            0.6 + 0.4 * sin(pos.x * 56.0),
            0.6 + 0.4 * sin(pos.y * 78.0),
            0.6 + 0.4 * cos(pos.z * 90.0)
          );
        }
      `)],
      statements: ({ inputs, outputs }) => dyno.unindentLines(`
        ${outputs.gsplat} = ${inputs.gsplat};
        ${outputs.gsplat}.rgba.rgb *= waveRgb(${inputs.gsplat}.center);
      `),
    });
    butterfly.worldModifier = worldModifier;

    // Inject DynoBlock with embedded GLSL shader that uses an external
    // uniform value animateT to control motion. Any GLSL statements can only
    // uses references provided in inputs + outputs, so we create a DynoBlock
    // that allows us to get `t` as an input parameter to our GLSL block.
    const animateT = dyno.dynoFloat(0);

    const objectModifier = dyno.dynoBlock(
      { gsplat: dyno.Gsplat },
      { gsplat: dyno.Gsplat },
      ({ gsplat }) => {
        // Create an inline GLSL block that has all the inputs we need
        const d = new dyno.Dyno({
          inTypes: { gsplat: dyno.Gsplat, t: "float" },
          outTypes: { gsplat: dyno.Gsplat },
          globals: () => [
            dyno.unindent(`
              float warpRadial(float r, float t) {
                return r * (1.0 + 0.1 * sin(r * 15.0 + t * 3.0));
              }
              vec3 warp(vec3 pos, float t) {
                float r = length(pos);
                float newR = warpRadial(r, t);
                return pos * (newR / r);
              }
            `)
          ],
          statements: ({ inputs, outputs }) => dyno.unindentLines(`
            ${outputs.gsplat} = ${inputs.gsplat};
            ${outputs.gsplat}.center = warp(${inputs.gsplat}.center, ${inputs.t});
          `),
        });
        // Apply the GLSL block with appropriate inputs and return the output
        gsplat = d.apply({ gsplat, t: animateT }).gsplat;
        return { gsplat };
      },
    );
    butterfly.objectModifier = objectModifier;

    // Make sure to update the generator after updating modifiers
    butterfly.updateGenerator();
    document.body.dataset.glslReady = "true";
    document.body.dataset.glslSplats = String(butterfly.numSplats);
    document.body.dataset.glslHasWorldModifier = String(worldModifier != null);
    document.body.dataset.glslHasObjectModifier = String(objectModifier != null);
    document.body.dataset.glslAnimateT = String(animateT.value);
    let frameCount = 0;
    let updates = 0;

    window.sparkGlsl = {
      setAnimateT(value) {
        animateT.value = value;
        butterfly.updateVersion();
        updates += 1;
        document.body.dataset.glslAnimateT = String(value);
        document.body.dataset.glslLastSetAnimateT = String(value);
        document.body.dataset.glslUpdates = String(updates);
        return animateT.value;
      },
    };

    const controls = new SparkControls({ canvas: env.renderer.domElement });
    env.run((time) => {
      frameCount += 1;
      animateT.value = time / 1000;
      document.body.dataset.glslFrames = String(frameCount);
      document.body.dataset.glslAnimateT = animateT.value.toFixed(3);
      butterfly.updateVersion();
      controls.update(env.camera);
    });
  </script>
</body>

</html>
