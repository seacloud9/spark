<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • LoD</title>
  <style>
    body {
      margin: 0;
      background-color: black;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm",
        "lil-gui": "../js/vendor/lil-gui/dist/lil-gui.esm.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import {
      PackedSplats,
      SparkControls,
      SplatMesh,
      isMobile,
    } from "@sparkjsdev/spark";
    import GUI from "lil-gui";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const RENDER_TIMEOUT_MS = 20000;

    const env = await setupSparkExample({
      cameraConfig: { fov: 75, near: 0.01, position: [0, 0, 1], lookAt: [0, 0, 0] },
      sparkOptions: { outsideFoveate: 1.0, behindFoveate: 1.0 },
    });

    const stats = new Stats();
    document.body.appendChild(stats.dom);

    const controls = new SparkControls({ canvas: env.renderer.domElement });
    controls.pointerControls.pointerRollScale = 0.0;
    controls.pointerControls.reverseRotate = isMobile();
    controls.pointerControls.rotateSpeed *= 2.0;

    document.addEventListener("keydown", (event) => {
      if (event.key === "\\") {
        console.log("Camera position: ", env.camera.position, "quaternion: ", env.camera.quaternion);
      }
    });

    const gui = new GUI({ title: "Settings" });
    const renderEnable = { value: true };
    let lastMoved = Number.POSITIVE_INFINITY;
    gui.add(renderEnable, "value").name("Enable render").listen().onChange((enabled) => {
      if (enabled) lastMoved = performance.now();
    });
    gui.add(controls.pointerControls, "reverseRotate").name("Reverse controls").listen();

    const url = await getAssetFileURL("valley.spz");
    const splats = new SplatMesh({ url, lod: true, nonLod: true });
    splats.quaternion.set(1, 0, 0, 0);
    env.add(splats);

    const char1 = new PackedSplats({
      url: await getAssetFileURL("butterfly.spz"),
      lod: true,
      nonLod: true,
    });
    const char2 = new PackedSplats({
      url: await getAssetFileURL("butterfly-ai.spz"),
      lod: true,
      nonLod: true,
    });

    for (let i = 0; i < 2; ++i) {
      const packedSplats = (i % 2) === 0 ? char1 : char2;
      const mesh = new SplatMesh({
        packedSplats,
        lodScale: 1.0,
        outsideFoveate: 1.0,
        behindFoveate: 0.3,
      });
      mesh.quaternion.set(1, 0, 0, 0);
      mesh.position.set(0.3 * (i % 3) - 1, 0, 0.3 * Math.floor(i / 3) - 2);
      mesh.scale.setScalar(0.3);
      env.add(mesh);
    }

    const lastPos = new THREE.Vector3().setScalar(Number.NEGATIVE_INFINITY);
    const lastDir = new THREE.Vector3();

    env.run(() => {
      stats.begin();
      controls.update(env.camera);

      const now = performance.now();
      const dir = env.camera.getWorldDirection(new THREE.Vector3());
      if (
        env.camera.position.distanceTo(lastPos) > 0.001 ||
        dir.dot(lastDir) < 0.999
      ) {
        lastMoved = now;
        renderEnable.value = true;
        lastPos.copy(env.camera.position);
        lastDir.copy(dir);
      }
      if (now - lastMoved > RENDER_TIMEOUT_MS) {
        renderEnable.value = false;
      }
      stats.end();
    });
  </script>
</body>

</html>
