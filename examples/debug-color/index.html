<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Debug Coloring</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
  <script type="module">
    import { SplatMesh, modifiers } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: { fov: 60, position: [0, 0, 0], lookAt: [0, 0, -1] },
    });

    let splatURL = await getAssetFileURL("butterfly.spz");
    const butterfly = new SplatMesh({ url: splatURL });
    butterfly.scale.setScalar(0.5);
    butterfly.quaternion.set(1, 0, 0, 0);
    butterfly.position.set(-0.5, 0, -1.5);
    modifiers.setWorldNormalColor(butterfly);
    env.add(butterfly);

    splatURL = await getAssetFileURL("butterfly-ai.spz");
    const butterfly2 = new SplatMesh({ url: splatURL });
    butterfly2.quaternion.set(1, 0, 0, 0);
    butterfly2.position.set(0.5, 0, -1.5);
    let depthParams = modifiers.setDepthColor(butterfly2, 1, 2, true);
    env.add(butterfly2);
    await Promise.all([butterfly.initialized, butterfly2.initialized]);

    let frameCount = 0;
    let updates = 0;

    function recordDebugColorState() {
      document.body.dataset.debugColorReady = "true";
      document.body.dataset.debugColorMeshes = "2";
      document.body.dataset.debugColorNormal = "true";
      document.body.dataset.debugColorDepthMin = String(depthParams.minDepth.value);
      document.body.dataset.debugColorDepthMax = String(depthParams.maxDepth.value);
      document.body.dataset.debugColorDepthReverse = String(depthParams.reverse.value);
      document.body.dataset.debugColorSplatsA = String(butterfly.numSplats);
      document.body.dataset.debugColorSplatsB = String(butterfly2.numSplats);
      document.body.dataset.debugColorFrames = String(frameCount);
      document.body.dataset.debugColorUpdates = String(updates);
      document.body.dataset.debugColorRotY = butterfly.rotation.y.toFixed(3);
      document.body.dataset.debugColorRotX = butterfly2.rotation.x.toFixed(3);
    }

    recordDebugColorState();

    window.sparkDebugColor = {
      setDepthRange(minDepth, maxDepth, reverse) {
        depthParams = modifiers.setDepthColor(butterfly2, minDepth, maxDepth, reverse);
        updates += 1;
        recordDebugColorState();
        return {
          maxDepth: depthParams.maxDepth.value,
          minDepth: depthParams.minDepth.value,
          reverse: depthParams.reverse.value,
          updates,
        };
      },
    };

    env.run((_time, deltaTime) => {
      frameCount += 1;
      butterfly.rotation.y += deltaTime / 2500;
      butterfly2.rotation.x += deltaTime / 2500;
      recordDebugColorState();
    });
  </script>
</body>

</html>
