<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Depth of Field</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm",
        "lil-gui": "../js/vendor/lil-gui/dist/lil-gui.esm.js"
      }
    }
  </script>
  <script type="module">
    import { SparkControls, SplatMesh } from "@sparkjsdev/spark";
    import GUI from "lil-gui";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: { fov: 60, position: [0, 0, 0], lookAt: [0, 0, -1] },
      sparkOptions: { apertureAngle: 0.02, focalDistance: 5.0 },
    });
    const queryParams = new URLSearchParams(window.location.search);
    const testAsset = queryParams.get("testAsset");

    const apertureSize = { apertureSize: 0.1 };
    function updateApertureAngle() {
      if (env.spark.focalDistance > 0) {
        env.spark.apertureAngle =
          2 * Math.atan(0.5 * apertureSize.apertureSize / env.spark.focalDistance);
      } else {
        env.spark.apertureAngle = 0.0;
      }
    }
    updateApertureAngle();

    const gui = new GUI({ title: "DoF settings" });
    gui.add(env.spark, "focalDistance", 0, 15, 0.01).name("Focal plane dist")
      .onChange(updateApertureAngle);
    gui.add(apertureSize, "apertureSize", 0, 0.4, 0.01).name("Aperture size")
      .onChange(updateApertureAngle);

    const splatURL = await getAssetFileURL(testAsset ?? "valley.spz");
    const background = new SplatMesh({ url: splatURL });
    background.quaternion.set(1, 0, 0, 0);
    background.scale.setScalar(0.5);
    env.add(background);
    await background.initialized;

    function recordDepthOfFieldState() {
      document.body.dataset.depthOfFieldFocalDistance = String(env.spark.focalDistance);
      document.body.dataset.depthOfFieldApertureAngle = env.spark.apertureAngle.toFixed(6);
      document.body.dataset.depthOfFieldApertureSize = String(apertureSize.apertureSize);
    }

    document.body.dataset.depthOfFieldReady = "true";
    document.body.dataset.depthOfFieldSplats = String(background.numSplats);
    document.body.dataset.depthOfFieldAsset = splatURL.substring(splatURL.lastIndexOf("/") + 1);
    recordDepthOfFieldState();
    let frameCount = 0;

    window.sparkDepthOfField = {
      setParams(params) {
        if (params.focalDistance != null) {
          env.spark.focalDistance = params.focalDistance;
        }
        if (params.apertureSize != null) {
          apertureSize.apertureSize = params.apertureSize;
        }
        updateApertureAngle();
        recordDepthOfFieldState();
        return {
          apertureAngle: env.spark.apertureAngle,
          apertureSize: apertureSize.apertureSize,
          focalDistance: env.spark.focalDistance,
        };
      },
    };

    // SparkControls binds pointer + WASD to a Three camera + renderer.
    // Under the Babylon backend, env.renderer is still the internal Three
    // renderer that SparkBabylonHost uses for splat sort, so the controls
    // attach to its DOM element. Under A-Frame's structural mock, same.
    const controls = new SparkControls({ canvas: env.renderer.domElement });

    env.run(() => {
      frameCount += 1;
      document.body.dataset.depthOfFieldFrames = String(frameCount);
      controls.update(env.camera);
    });
  </script>
</body>

</html>
