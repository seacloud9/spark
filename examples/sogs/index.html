<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • SOGS</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { Sky } from "three/addons/objects/Sky.js";
    import { SplatMesh } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    const env = await setupSparkExample({
      cameraConfig: { fov: 60, near: 0.01, position: [0, 1.5, -1.2], lookAt: [0, 1.5, 0] },
    });

    const splatURL = await getAssetFileURL("sutro.zip");
    const sutroTower = new SplatMesh({ url: splatURL });
    sutroTower.quaternion.set(1, 0, 0, 0);
    env.add(sutroTower);
    await sutroTower.initialized;

    // Three.js Sky helper is added to the same scene Spark renders, so under
    // aframe (structural mock against the same Three triple) and babylon
    // (texture-bridge — Spark's internal Three renders the splats + sky, then
    // Babylon composites the result as a Layer) the sky shows up on all three
    // backends without per-engine branching.
    const sky = new Sky();
    sky.scale.setScalar(450000);
    const phi = THREE.MathUtils.degToRad(20);
    const theta = THREE.MathUtils.degToRad(90);
    const sunPosition = new THREE.Vector3().setFromSphericalCoords(1, phi, theta);
    sky.material.uniforms.sunPosition.value = sunPosition;
    env.add(sky);

    const controls = new OrbitControls(env.camera, env.renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.minDistance = 0.2;
    controls.maxDistance = 8.0;
    controls.enablePan = false;
    let frameCount = 0;

    function recordSogsState() {
      document.body.dataset.sogsSun = sky.material.uniforms.sunPosition.value.toArray().map((value) => value.toFixed(3)).join(",");
      document.body.dataset.sogsTarget = controls.target.toArray().map((value) => value.toFixed(3)).join(",");
      document.body.dataset.sogsFrames = String(frameCount);
    }

    document.body.dataset.sogsReady = "true";
    document.body.dataset.sogsSplats = String(sutroTower.numSplats);
    document.body.dataset.sogsSky = String(sky.parent === env.scene);
    recordSogsState();

    window.sparkSogs = {
      setSun(phiDegrees, thetaDegrees) {
        const nextPhi = THREE.MathUtils.degToRad(phiDegrees);
        const nextTheta = THREE.MathUtils.degToRad(thetaDegrees);
        sky.material.uniforms.sunPosition.value.setFromSphericalCoords(1, nextPhi, nextTheta);
        recordSogsState();
        return sky.material.uniforms.sunPosition.value.toArray();
      },
    };

    env.run(() => {
      frameCount += 1;
      recordSogsState();
      controls.update();
    });
  </script>
</body>

</html>
