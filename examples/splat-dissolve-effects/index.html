<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Spark • Splat Dissolve Effects</title>
	<style>
		body {
			margin: 0;
		}
		canvas {
			touch-action: none;
		}
	</style>
</head>

<body>
	<script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
	<script type="module">
		import * as THREE from "three";
		import { OrbitControls } from "three/addons/controls/OrbitControls.js";
		import { SplatMesh, dyno } from "@sparkjsdev/spark";
		import { getAssetFileURL } from "/examples/js/get-asset-url.js";
		import { setupSparkExample } from "../js/spark-engine.js";

		const flyPos = new THREE.Vector3(0, 0, -0.5);

		const env = await setupSparkExample({
			cameraConfig: { fov: 60, near: 0.1, position: [0, 0, 0], lookAt: [0, 0, -1] },
		});

		const controls = new OrbitControls(env.camera, env.renderer.domElement);
		controls.target.copy(flyPos);
		controls.enablePan = false;

		/*
			Asset: fly.spz
			Author: Danny Bittel (https://danybittel.ch/)
			License: License: CC BY 4.0
			Source: https://www.patreon.com/cw/DanyBittel
		*/
		const splatURL = await getAssetFileURL("fly.spz");
			const fly = new SplatMesh({ url: splatURL });
			const animateT = dyno.dynoFloat(0);
			fly.quaternion.set(1, 0, 0, 0);
			fly.position.copy(flyPos);
			env.add(fly);
			fly.initialized.then(() => {
				document.body.dataset.dissolveEffectsReady = "true";
				document.body.dataset.dissolveEffectsSplats = String(fly.numSplats);
			});
			let dissolveFrameCount = 0;

		fly.objectModifier = dyno.dynoBlock({ gsplat: dyno.Gsplat }, { gsplat: dyno.Gsplat }, ({ gsplat }) => {
			const d = new dyno.Dyno({
				inTypes: {
					gsplat: dyno.Gsplat,
					t: "float",
				},
				outTypes: { gsplat: dyno.Gsplat },
				globals: () => [
					dyno.unindent(`
            vec3 hash(vec3 p) {
              return fract(sin(p*123.456)*123.456);
            }
            `),
				],
				statements: ({ inputs, outputs }) =>
					dyno.unindentLines(`
            ${outputs.gsplat} = ${inputs.gsplat};
            vec3 localPos = ${inputs.gsplat}.center;
            vec3 hashVal = hash(localPos);
            float startTime = hashVal.x * 100.0;
            float shouldOscillate = step(startTime, ${inputs.t});
            float oscillation = sin(${inputs.t} * 2.0 + hashVal.y * 6.28) * 0.5 + 0.5; // 0 to 1
            vec4 whiteColor = vec4(1.0, 1.0, 1.0, 1.0);
						vec3 moveDirection = normalize(vec3(
							1.0,
							(hashVal.y - 0.5) * 0.9,
							(hashVal.z - 0.5) * 0.9
						));
						float randomSpeed = fract(sin(dot(${inputs.gsplat}.center, vec3(12., 78., 45.))) * 43758.);
						float moveAmount = ${inputs.t} * 0.1 * randomSpeed * shouldOscillate;
						${outputs.gsplat}.center = ${inputs.gsplat}.center + moveDirection * moveAmount;
						${outputs.gsplat}.rgba = mix(${inputs.gsplat}.rgba,
							mix(${inputs.gsplat}.rgba, whiteColor, oscillation),
							shouldOscillate);
						// Slow fade out
						${outputs.gsplat}.rgba.w *= mix(1.0, 1.0 - clamp(moveAmount / 2.0, 0.0, 1.0), shouldOscillate);
			  	`),
			});

			gsplat = d.apply({
				gsplat,
				t: animateT,
			}).gsplat;

			return { gsplat };
		});

			let startTime = 0;
			function seekDissolve(seconds) {
				animateT.value = seconds;
				fly.needsUpdate = true;
				document.body.dataset.dissolveEffectsSeek = String(seconds);
			}
			window.sparkDissolveEffects = { seek: seekDissolve };

			env.run((time) => {
				dissolveFrameCount += 1;
				document.body.dataset.dissolveEffectsFrames = String(dissolveFrameCount);
				if (startTime === 0) startTime = time;
				const elapsedTime = (time - startTime) / 1000;

				controls.update();
				animateT.value = elapsedTime;
				document.body.dataset.dissolveEffectsElapsed = elapsedTime.toFixed(3);
				fly.needsUpdate = true;
			});
	</script>
</body>

</html>
