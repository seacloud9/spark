<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Hello World</title>
  <style>
    body {
      margin: 0;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
      }
    }
  </script>
  <script type="module">
    import { SplatMesh } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";
    import { setupSparkExample } from "../js/spark-engine.js";

    // Engine selected by ?engine=three|aframe|babylon, default three.
    const env = await setupSparkExample({
      cameraConfig: { fov: 60, position: [0, 0, 0], lookAt: [0, 0, -1] },
    });

    const splatURL = await getAssetFileURL("butterfly.spz");
    const butterfly = new SplatMesh({ url: splatURL });
    butterfly.quaternion.set(1, 0, 0, 0);
    butterfly.position.set(0, 0, -3);
    env.add(butterfly);

    env.run((_time, deltaTime) => {
      butterfly.rotation.y += deltaTime / 2500;
    });
  </script>
</body>

</html>
