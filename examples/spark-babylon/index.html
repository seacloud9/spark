<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark · BabylonJS host</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0d12;
      }
      #renderCanvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      .label {
        position: absolute;
        left: 16px;
        top: 16px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #cdd4e0;
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 10px;
        border-radius: 4px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div class="label">Spark splats hosted inside a BabylonJS scene</div>
    <script type="importmap">
      {
        "imports": {
          "three": "../js/vendor/three/build/three.module.js",
          "three/addons/": "../js/vendor/three/examples/jsm/",
          "@sparkjsdev/spark": "../../dist/spark.module.js",
          "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@9/+esm"
        }
      }
    </script>
    <script type="module">
      import "@babylonjs/core/Shaders/layer.vertex.js";
      import "@babylonjs/core/Shaders/layer.fragment.js";
      import {
        Color4,
        Engine,
        FreeCamera,
        Layer,
        RawTexture,
        Scene,
        Texture,
        Vector3,
      } from "@babylonjs/core";
      import {
        babylon as sparkBabylon,
        constructAxes,
        constructSpherePoints,
        SplatMesh,
      } from "@sparkjsdev/spark";

      const canvas = document.querySelector("#renderCanvas");
      const engine = new Engine(canvas, false, {
        preserveDrawingBuffer: true,
        stencil: false,
      });

      // Babylon refuses to render a scene without an active camera, even
      // when all visible content comes from a background Layer (which is
      // how SparkBabylonHost composites the splat image).
      const scene = new Scene(engine);
      scene.clearColor = new Color4(0, 0, 0, 1);
      new FreeCamera("placeholder", new Vector3(0, 0, 0), scene);

      function makeHost() {
        const size = sizeForCanvas();
        const host = new sparkBabylon.SparkBabylonHost({
          babylon: { RawTexture, Layer, Engine, Texture, Color4 },
          scene,
          width: size.width,
          height: size.height,
          sparkRendererOptions: { enableLod: false, minSortIntervalMs: 0 },
          clearColor: 0x10151c,
        });
        host.setCamera({
          position: [0.9, 0.8, 2.4],
          lookAt: [0, 0, 0],
          fov: 45,
          near: 0.01,
          far: 10,
        });
        return host;
      }

      function sizeForCanvas() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        return {
          width: Math.round(canvas.clientWidth * dpr),
          height: Math.round(canvas.clientHeight * dpr),
        };
      }

      let host = makeHost();

      // Two SplatMeshes living in Spark's internal scene: a rainbow sphere
      // on the left and the RGB axes shifted right and forward so they
      // overlap. Both are added to the host; SparkRenderer'\''s painter sort
      // interleaves splats from the two meshes correctly.
      const sphere = new SplatMesh({
        constructSplats: (splats) => {
          constructSpherePoints({
            splats,
            radius: 0.55,
            maxDepth: 2,
            pointRadius: 0.045,
            pointThickness: 0.006,
            color: (color, point) =>
              color.setRGB(
                0.45 + 0.55 * point.x,
                0.45 + 0.55 * point.y,
                0.45 + 0.55 * point.z,
              ),
          });
        },
      });
      sphere.position.set(-0.55, 0, 0);

      const axes = new SplatMesh({
        constructSplats: (splats) => {
          constructAxes({
            splats,
            scale: 0.55,
            axisRadius: 0.025,
            axisShadowScale: 1.6,
          });
        },
      });
      axes.position.set(0.6, 0, 0.4);

      await Promise.all([sphere.initialized, axes.initialized]);
      host.add(sphere);
      host.add(axes);

      await scene.whenReadyAsync();
      document.body.dataset.babylonTextureReady = "true";

      let frame = 0;
      engine.runRenderLoop(async () => {
        // Gentle rotation so the cross-mesh depth sort is visible.
        const t = performance.now() / 4000;
        sphere.rotation.y = Math.sin(t) * 0.6;
        axes.rotation.y = Math.cos(t * 0.8) * 0.5;

        await host.renderOnce();
        scene.render();
        frame++;
        document.body.dataset.babylonTextureFrames = String(frame);
      });

      window.addEventListener("resize", () => {
        // Rebuild the host at the new pixel size. The cheaper alternative
        // is `host.setSize(...)` but that does not exist yet — the texture
        // bridge currently fixes its dimensions at construction time.
        host.dispose();
        host = makeHost();
        host.add(sphere);
        host.add(axes);
        engine.resize();
      });
    </script>
  </body>
</html>
