<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Spark A-Frame Snapshot Fixture</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0a0d12;
      }
      a-scene {
        width: 1024px !important;
        height: 768px !important;
        display: block;
      }
      .a-modal,
      .a-orientation-modal,
      .a-enter-vr,
      .a-enter-ar {
        display: none !important;
      }
    </style>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  </head>
  <body>
    <script type="module">
      import { constructAxes, SparkRenderer, SplatMesh } from "/src/index.ts";
      import { registerSparkAFrame } from "/src/backends/aframe/SparkAFrameIntegration.ts";

      // A-Frame inserts a "place phone into Cardboard" orientation modal
      // whenever it thinks the device is mobile, which blocks a-scene init
      // under headless Chromium. Patch the device probes before the
      // <a-scene> element is added to the DOM so a-scene's connectedCallback
      // sees a desktop environment. A-Frame 1.7 exposes isMobile / isMobileVR
      // as non-writable getters, so we use defineProperty.
      const AFRAME = window.AFRAME;
      const forceDesktop = (obj, name) => {
        try {
          Object.defineProperty(obj, name, {
            value: () => false,
            configurable: true,
            writable: true,
          });
        } catch {
          // A-Frame 1.7 marks these getters non-configurable; the modal
          // happens to not block headless render so the failure is benign.
        }
      };
      if (AFRAME?.utils?.device) {
        forceDesktop(AFRAME.utils.device, "isMobile");
        forceDesktop(AFRAME.utils.device, "isMobileVR");
        forceDesktop(
          AFRAME.utils.device,
          "isMobileDeviceRequestingDesktopSite",
        );
      }

      registerSparkAFrame(AFRAME, {
        sparkRendererOptions: { enableLod: false, minSortIntervalMs: 0 },
      });

      const sceneEl = document.createElement("a-scene");
      sceneEl.setAttribute("embedded", "");
      sceneEl.setAttribute("background", "color: #10151c");
      sceneEl.setAttribute(
        "renderer",
        "antialias: false; alpha: false; colorManagement: false; preserveDrawingBuffer: true",
      );
      sceneEl.setAttribute("vr-mode-ui", "enabled: false");
      sceneEl.setAttribute(
        "device-orientation-permission-ui",
        "enabled: false",
      );

      const camEl = document.createElement("a-entity");
      camEl.setAttribute(
        "camera",
        "active: true; fov: 45; near: 0.01; far: 10",
      );
      camEl.setAttribute("position", "0.9 0.7 1.9");
      camEl.setAttribute("rotation", "-19.8 25.35 0");
      sceneEl.appendChild(camEl);

      document.body.appendChild(sceneEl);

      const onReady = async () => {
        const mesh = new SplatMesh({
          constructSplats: (splats) => {
            constructAxes({
              splats,
              scale: 0.45,
              axisRadius: 0.025,
              axisShadowScale: 1.5,
            });
          },
        });
        await mesh.initialized;
        sceneEl.object3D.add(mesh);

        const spark = sceneEl.systems.spark?.spark;
        const camera = sceneEl.camera;
        if (spark && camera) {
          await spark.update({ scene: sceneEl.object3D, camera });
        }
        for (let i = 0; i < 3; i++) {
          await new Promise((r) => requestAnimationFrame(r));
        }

        window.sparkAFrameSnapshotReady = {
          backend: "aframe",
          meshSplats: mesh.numSplats,
          activeSplats: spark?.activeSplats ?? 0,
        };
        document.body.dataset.ready = "true";
      };

      if (sceneEl.hasLoaded) {
        onReady();
      } else {
        sceneEl.addEventListener("loaded", onReady, { once: true });
      }
    </script>
  </body>
</html>
