<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Spark A-Frame Snapshot Fixture</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0a0d12;
      }
      #view {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="view" width="1024" height="768"></canvas>
    <script type="module">
      import * as THREE from "three";
      import { constructAxes, SparkRenderer, SplatMesh } from "/src/index.ts";
      import { registerSparkAFrame } from "/src/backends/aframe/SparkAFrameIntegration.ts";

      // We deliberately do NOT load A-Frame from CDN. The CDN UMD bundle
      // ships its own Three.js (r173) which collides with Spark's Three
      // (r180), so cross-namespace WebGLRenderTarget/DataTexture traffic
      // breaks the render. The same incompatibility would exist for any
      // production A-Frame deployment that does not share Three at the
      // bundler level — that is the *real* requirement for A-Frame parity.
      //
      // To exercise registerSparkAFrame against a real Three render we use
      // a minimal structural mock of A-Frame's globals: a renderer + scene
      // + camera + a systems map + a registerSystem/registerComponent
      // shim. This is exactly the surface registerSparkAFrame consumes;
      // the same code paths run as they would inside a bundler-resolved
      // <a-scene>, and the render uses a single shared THREE so the
      // resulting PNG is a true parity baseline against snapshot-three.

      const canvas = document.querySelector("#view");
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: false,
        preserveDrawingBuffer: true,
      });
      renderer.setSize(1024, 768, false);
      renderer.setClearColor(0x10151c, 1);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, 1024 / 768, 0.01, 10);
      camera.position.set(0.9, 0.7, 1.9);
      camera.lookAt(0, 0, 0);

      const systems = {};
      const sceneElMock = {
        renderer,
        object3D: scene,
        camera,
        hasLoaded: true,
        systems,
        addEventListener(_event, handler) {
          // Scene is already "loaded" — fire any 'loaded' handler immediately.
          if (typeof handler === "function") {
            queueMicrotask(handler);
          }
        },
      };

      const aframeMock = {
        THREE,
        registerSystem(name, def) {
          const instance = Object.create(def);
          instance.el = sceneElMock;
          if (typeof instance.init === "function") {
            instance.init();
          }
          systems[name] = instance;
        },
        registerComponent(_name, _def) {
          // The constructAxes scene does not use the URL-driven spark-splat
          // component; registration is a no-op for this fixture.
        },
      };

      registerSparkAFrame(aframeMock, {
        sparkRendererOptions: { enableLod: false, minSortIntervalMs: 0 },
      });

      const mesh = new SplatMesh({
        constructSplats: (splats) => {
          constructAxes({
            splats,
            scale: 0.45,
            axisRadius: 0.025,
            axisShadowScale: 1.5,
          });
        },
      });
      await mesh.initialized;
      scene.add(mesh);

      const spark = systems.spark.spark;
      await spark.update({ scene, camera });
      renderer.render(scene, camera);
      await new Promise((resolve) => requestAnimationFrame(resolve));
      renderer.render(scene, camera);

      window.sparkAFrameSnapshotReady = {
        backend: "aframe",
        meshSplats: mesh.numSplats,
        activeSplats: spark.activeSplats,
      };
      document.body.dataset.ready = "true";
    </script>
  </body>
</html>
