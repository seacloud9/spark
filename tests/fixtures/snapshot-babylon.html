<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Spark BabylonJS Snapshot Fixture</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0a0d12;
      }
      #view {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="view" width="1024" height="768"></canvas>
    <script type="module">
      import {
        Color4,
        Constants,
        Effect,
        Engine,
        FreeCamera,
        Layer,
        Matrix,
        Mesh,
        RawTexture,
        RawTexture2DArray,
        Scene,
        ShaderMaterial,
        Texture,
        VertexData,
        Vector3,
      } from "@babylonjs/core";
      import { SparkBabylonHost } from "/src/backends/babylon/SparkBabylonHost.ts";
      import { getScene, getSceneName } from "/tests/fixtures/scenes.mjs";

      // Surface init errors into the page DOM so Playwright's text-on-
      // body assertion can show them instead of a generic "data-ready
      // never set" timeout. Phase D adds enough new code paths
      // (registerSparkBabylonShaderChunks, ShaderMaterial compile,
      // RawTexture2DArray construction) that opaque init failures
      // become hard to diagnose without a console-bridge.
      window.addEventListener("error", (event) => {
        document.body.dataset.error = String(
          event.error?.stack || event.error?.message || event.message,
        );
      });
      window.addEventListener("unhandledrejection", (event) => {
        document.body.dataset.error = String(
          event.reason?.stack || event.reason?.message || event.reason,
        );
      });

      const sceneName = getSceneName();
      const sceneCfg = getScene(sceneName);
      // Phase D: ?mode=native flips the host from the MVP texture-bridge
      // Layer composite to the native ShaderMaterial + Mesh path. Default
      // is "texture" so existing matrix captures stay unchanged.
      const url = new URL(window.location.href);
      const mode = url.searchParams.get("mode") === "native" ? "native" : "texture";

      const canvas = document.querySelector("#view");
      const engine = new Engine(canvas, false, {
        preserveDrawingBuffer: true,
        stencil: false,
      });
      engine.setSize(1024, 768);

      const scene = new Scene(engine);
      scene.clearColor = new Color4(0, 0, 0, 1);
      scene.autoClear = true;
      // Babylon refuses to render a scene without an active camera. In
      // texture mode the splat image comes from a background Layer so a
      // placeholder FreeCamera at the origin is fine. In native mode the
      // splat mesh is drawn through the active camera — we still keep a
      // FreeCamera placeholder because the splat shader writes gl_Position
      // entirely from Spark's Three-camera projection uniform, so the
      // Babylon camera's transform does not affect the rendered splats.
      const placeholderCam = new FreeCamera(
        "placeholder",
        new Vector3(0, 0, 0),
        scene,
      );
      scene.activeCamera = placeholderCam;

      const babylonTextureHost = { RawTexture, Layer, Engine, Texture, Color4 };
      // Native mode needs the fuller Babylon surface (BabylonMeshHost) for
      // SparkBabylonMaterial + SparkBabylonMesh + SparkBabylonTextureBridge.
      const babylonNativeHost = {
        Effect,
        ShaderMaterial,
        Mesh,
        VertexData,
        Matrix,
        Constants,
        RawTexture,
        RawTexture2DArray,
        Texture,
        Engine,
      };

      const host = new SparkBabylonHost({
        babylon: babylonTextureHost,
        babylonNative: mode === "native" ? babylonNativeHost : undefined,
        mode,
        scene,
        width: 1024,
        height: 768,
        sparkRendererOptions: {
          enableLod: false,
          minSortIntervalMs: 0,
          ...(sceneCfg.sparkOverrides ?? {}),
        },
        clearColor: sceneCfg.clearColor,
      });

      host.setCamera({
        position: sceneCfg.camera.position,
        lookAt: sceneCfg.camera.lookAt,
        fov: sceneCfg.camera.fov,
        near: sceneCfg.camera.near,
        far: sceneCfg.camera.far,
      });

      const built = await sceneCfg.build();
      host.add(built.root);
      if (typeof built.postInit === "function") {
        await built.postInit({
          spark: host.sparkRenderer,
          scene: host.threeScene,
          camera: host.threeCamera,
          renderer: host.threeRenderer,
        });
      }
      if (typeof sceneCfg.time === "number") {
        host.sparkRenderer.time = sceneCfg.time;
      }

      await scene.whenReadyAsync();

      let frames = 0;
      try {
        for (let i = 0; i < 10; i++) {
          await host.renderOnce();
          scene.render();
          frames += 1;
          await new Promise((resolve) => requestAnimationFrame(resolve));
        }
      } catch (err) {
        document.body.dataset.error = String(err?.stack || err?.message || err);
        throw err;
      }

      window.sparkBabylonSnapshotReady = {
        backend: "babylon",
        scene: sceneName,
        mode,
        engineVersion: Engine.Version,
        meshSplats: built.splatCount,
        activeSplats: host.sparkRenderer.activeSplats,
        framesRendered: frames,
        isPlaceholder: false,
        // Phase D diagnostic — surface native-mode runtime state so e2e
        // failures point at the right layer (mesh setup vs uniform sync
        // vs texture bridge vs shader output).
        nativeMeshState:
          mode === "native"
            ? {
                thinInstanceCount: host.nativeMesh.mesh.thinInstanceCount,
                isVisible: host.nativeMesh.mesh.isVisible,
                isEnabled: host.nativeMesh.mesh.isEnabled(),
                materialReady: host.nativeMaterial.material.isReady(
                  host.nativeMesh.mesh,
                ),
                displayExtSplats: host.sparkRenderer.display.extSplats,
                targetWidth: host.sparkRenderer.display.target?.width ?? 0,
                targetHeight: host.sparkRenderer.display.target?.height ?? 0,
                targetDepth: host.sparkRenderer.display.target?.depth ?? 0,
                orderingWidth:
                  host.sparkRenderer.orderingTexture?.image.width ?? 0,
                orderingHeight:
                  host.sparkRenderer.orderingTexture?.image.height ?? 0,
              }
            : undefined,
      };
      document.body.dataset.ready = "true";
    </script>
  </body>
</html>
